spring.application.name=wastewise

# ── MySQL Database Connection ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/wastewise_db
spring.datasource.username=root
spring.datasource.password=Dasun123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
# ── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
 
# update = creates the table if it doesn't exist, updates columns if they change
# NEVER use "create" in production — it drops and recreates the table every restart
spring.jpa.hibernate.ddl-auto=update
 
# Prints the SQL Spring generates — useful for learning, remove later
spring.jpa.show-sql=true
