<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout}">
<head>
    <title th:text="'Home | Waste Wise'">Home</title>
</head>
<body>
    <th:block th:fragment="page-title">
        Battaramulla Garbage Bin Map
    </th:block>

    <!-- Empty styles fragment – needed to satisfy layout.html -->
    <th:block th:fragment="styles"></th:block>

    <!-- Map container (content fragment) -->
    <div th:fragment="content" id="map"></div>

    <!-- Scripts fragment with Leaflet and your combined map logic -->
    <th:block th:fragment="scripts">
        <!-- Leaflet CSS -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
              integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
              crossorigin="" />

        <!-- Leaflet JS -->
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
                integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
                crossorigin=""></script>

        <!-- Map logic -->
        <script th:src="@{/js/map-config.js}"></script>
        <script th:src="@{/js/index-map.js}"></script>
    </th:block>
</body>
</html>
