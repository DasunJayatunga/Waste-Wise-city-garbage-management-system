<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout}">
<head>
    <title th:text="'Manage Bins | Waste Wise'">Manage Bins</title>
</head>
<body>
    <!-- Dynamic Page Title -->
    <th:block th:fragment="page-title">
        Manage Garbage Bins
    </th:block>

    <!-- Extra CSS for this page -->
    <th:block th:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/manage-bins.css}" />
    </th:block>

    <!-- Main Content (injected into layout's .main-content) -->
    <div th:fragment="content"  class="content-wrapper">
        <!-- This wrapper ensures row layout while filling the parent -->
        <div class="manage-layout">
            <!-- Left Panel -->
            <div class="manage-panel">
                <div class="panel-section">
                    <h2>Add New Bin</h2>
                    <p class="hint">
                        📍 Click anywhere on the map to set the bin location.
                    </p>

                    <div class="form-group">
                        <label for="deviceId">Device ID <span class="optional">(optional)</span></label>
                        <input type="text" id="deviceId" placeholder="e.g. ESP32-BIN-001 — leave blank if no sensor" />
                    </div>

                    <div class="form-group">
                        <label for="latitude">Latitude</label>
                        <input type="text" id="latitude" placeholder="Click map to set..." readonly />
                    </div>

                    <div class="form-group">
                        <label for="longitude">Longitude</label>
                        <input type="text" id="longitude" placeholder="Click map to set..." readonly />
                    </div>

                    <button class="btn-add" onclick="addBin()">Add Bin</button>
                </div>

                <div class="panel-section">
                    <h2>Existing Bins</h2>
                    <div id="bin-list">
                        <p class="loading-text">Loading bins...</p>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Leaflet Map -->
            <div id="manage-map"></div>
        </div>
        
    </div>

    <!-- Page‑specific scripts -->
    <th:block th:fragment="scripts">
        <!-- Leaflet CSS + JS (same as home page) -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
              integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
              crossorigin="" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
                integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
                crossorigin=""></script>

        <!-- Map logic -->
        <script th:src="@{/js/map-config.js}"></script>
        <script th:src="@{/js/manage-bins.js}"></script>
    </th:block>
</body>
</html>
